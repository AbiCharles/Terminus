# Task configuration schema version
version = "2.0"

# Task metadata (author, difficulty, categorization)
[metadata]
author_name = "Abigail Charles"
author_email = "warriorp8@gmail.com"
difficulty = "hard"
category = "scientific-computing"
# Options for subcategories are: "long_context", "tool_specific", "api_integration", "db_interaction", "ui_building"
subcategories = ["tool_specific"]
# Total milestone count — must match the number of [[steps]] blocks below
number_of_milestones = 3
# Size of the codebase: minimal -> 0-20 files, small -> 20+ files, large -> 200+ files
codebase_size = "minimal"
# Coding languages used in the oracle solution or required by the agent
languages = ["c"]
# For tool_specific, api_integration, and db_interaction subcategories, please include specific tool, api framework, or database software
tags = ["c", "signal-processing", "dft", "fft", "spectral-analysis", "numerical-computing", "undefinedbehaviorsanitizer", "gcc"]
# Estimated time to complete (minutes)
expert_time_estimate_min = 150
junior_time_estimate_min = 360

# The agent implements a spectral-analysis library in C at /app/signal.c, against
# the contract in /app/signal.h, from scratch (libm only). Milestone 1 computes
# time-domain statistics (mean, population variance, stddev, rms, min, max).
# Milestone 2 implements the discrete Fourier transform and dominant-frequency
# detection over the half spectrum. Milestone 3 computes the power-based spectral
# signal-to-noise ratio in decibels, a 95% confidence interval for the mean, and
# an SNR acceptance gate. The verifier compiles the candidate's library together
# with an independent C harness under UndefinedBehaviorSanitizer and checks the
# results against direct recomputation, analytic spectral invariants (Parseval's
# relation, the DC term, known synthetic-tone content) and an independent
# reference DFT.

# Sandbox environment limits — applied across all milestones (the same container is shared)
[environment]
allow_internet = false
build_timeout_sec = 1200.0
cpus = 4
memory_mb = 8192
storage_mb = 10240
workdir = "/app"

# Milestone 1 — Time-domain statistics
[[steps]]
name = "milestone_1"

[steps.agent]
timeout_sec = 1800.0

[steps.verifier]
timeout_sec = 600.0

# Milestone 2 — Discrete Fourier transform and dominant frequencies
[[steps]]
name = "milestone_2"

[steps.agent]
timeout_sec = 1800.0

[steps.verifier]
timeout_sec = 600.0

# Milestone 3 — Spectral SNR, confidence interval and acceptance gate
[[steps]]
name = "milestone_3"

[steps.agent]
timeout_sec = 1800.0

[steps.verifier]
timeout_sec = 600.0
