# Task configuration schema version
version = "2.0"

# Task metadata (author, difficulty, categorization)
[metadata]
author_name = "Abigail Charles"
author_email = "warriorp8@gmail.com"
difficulty = "hard"
category = "data-processing"
# Options for subcategories are: "long_context", "tool_specific", "api_integration", "db_interaction", "ui_building"
subcategories = ["db_interaction", "tool_specific"]
# Total milestone count — must match the number of [[steps]] blocks below
number_of_milestones = 3
# Size of the codebase: minimal -> 0-20 files, small -> 20+ files, large -> 200+ files
codebase_size = "minimal"
# Coding languages used in the oracle solution or required by the agent
languages = ["sql", "python"]
# For tool_specific, api_integration, and db_interaction subcategories, please include specific tool, api framework, or database software
tags = ["duckdb", "recursive-cte", "graph", "sql", "strongly-connected-components"]
# Estimated time to complete (minutes)
expert_time_estimate_min = 150
junior_time_estimate_min = 300

# The agent connects to the DuckDB database at /app/graph.duckdb (tables `nodes`
# and `edges`, a directed graph that contains cycles) and follows the contract in
# /app/spec.md. Milestone 1 builds the transitive-reachability table `reachability`
# with a recursive CTE that terminates on cycles. Milestone 2 builds the
# `components` table labelling each node with the minimum node id of its strongly
# connected component. Milestone 3 builds the `shortest_cycles` table giving the
# shortest directed cycle length through each node that lies on a cycle. All
# outputs are written back into /app/graph.duckdb.

# Sandbox environment limits — applied across all milestones (the same container is shared)
[environment]
allow_internet = false
build_timeout_sec = 1200.0
cpus = 4
memory_mb = 8192
storage_mb = 12288
workdir = "/app"

# Milestone 1 — Transitive Reachability: recursive CTE closure that handles cycles
[[steps]]
name = "milestone_1"

[steps.agent]
timeout_sec = 1800.0

[steps.verifier]
timeout_sec = 600.0

# Milestone 2 — Strongly Connected Components: min-id component labelling via mutual reachability
[[steps]]
name = "milestone_2"

[steps.agent]
timeout_sec = 1800.0

[steps.verifier]
timeout_sec = 600.0

# Milestone 3 — Shortest Cycles: shortest directed cycle length per node on a cycle
[[steps]]
name = "milestone_3"

[steps.agent]
timeout_sec = 1800.0

[steps.verifier]
timeout_sec = 600.0
