# Task configuration schema version
version = "2.0"

# Task metadata (author, difficulty, categorization)
[metadata]
author_name = "Abigail Charles"
author_email = "warriorp8@gmail.com"
difficulty = "hard"
category = "scientific-computing"
# Options for subcategories are: "long_context", "tool_specific", "api_integration", "db_interaction", "ui_building"
subcategories = ["api_integration", "db_interaction"]
# Total milestone count — must match the number of [[steps]] blocks below
number_of_milestones = 3
# Size of the codebase: minimal -> 0-20 files, small -> 20+ files, large -> 200+ files
codebase_size = "minimal"
# Coding languages used in the oracle solution or required by the agent
languages = ["python", "sql"]
# For tool_specific, api_integration, and db_interaction subcategories, please include specific tool, api framework, or database software
tags = ["flask", "sqlite", "scipy", "curve-fitting", "rest-api"]
# Estimated time to complete (minutes)
expert_time_estimate_min = 150
junior_time_estimate_min = 300

# The agent reads experiment metadata + sensor calibration from SQLite at
# /app/experiments.db, fetches paginated RAW observations from a local Flask API
# at http://127.0.0.1:8000 (source in /app/api/, launched by /app/start_api.sh),
# and follows the contract in /app/spec.md, all for experiment 1. Milestone 1
# writes /app/output/metadata.json. Milestone 2 fetches every page, converts raw
# readings to physical units via the calibration, drops invalid readings, and
# writes /app/output/observations.csv. Milestone 3 fits the settling model and
# writes /app/output/report.json with the parameter estimates, 95% confidence
# intervals, derived settling velocity and Stokes effective diameter, and residual
# metrics.

# Sandbox environment limits — applied across all milestones (the same container is shared)
[environment]
allow_internet = false
build_timeout_sec = 1200.0
cpus = 4
memory_mb = 8192
storage_mb = 12288
workdir = "/app"

# Milestone 1 — Query Experiment Metadata: join experiments + sensor calibration from SQLite
[[steps]]
name = "milestone_1"

[steps.agent]
timeout_sec = 1800.0

[steps.verifier]
timeout_sec = 600.0

# Milestone 2 — Retrieve Settling Observations: paginated API fetch + unit conversion + filtering
[[steps]]
name = "milestone_2"

[steps.agent]
timeout_sec = 2400.0

[steps.verifier]
timeout_sec = 600.0

# Milestone 3 — Fit Sedimentation Model: nonlinear curve fit, CIs, derived quantities, residuals
[[steps]]
name = "milestone_3"

[steps.agent]
timeout_sec = 2400.0

[steps.verifier]
timeout_sec = 600.0
